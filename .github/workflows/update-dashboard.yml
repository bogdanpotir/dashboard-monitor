name: Aggiorna Dashboard JSON

on:
  repository_dispatch:
    types: [update_dashboard_data]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Crea dati.json
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime

          payload = json.loads(os.environ["CLIENT_PAYLOAD"])

          dati = {
              "efficienza_mensile": payload.get("efficienza_mensile", 0),
              "media_giornaliera": payload.get("media_giornaliera", 0),
              "media_mensile_pk": payload.get("media_mensile_pk", 0),
              "foglio_report": payload.get("foglio_report", ""),
              "foglio_colli": payload.get("foglio_colli", ""),
              "data_dashboard": payload.get("data_dashboard", ""),
              "ultimo_aggiornamento": payload.get("ultimo_aggiornamento", ""),
              "trend_orario": payload.get("trend_orario", [])
          }

          with open("dati.json", "w", encoding="utf-8") as f:
              json.dump(dati, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

      - name: Commit e push dati.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dati.json

          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare"
          else
            git commit -m "Aggiornamento automatico dati dashboard"
            git push
          fi
